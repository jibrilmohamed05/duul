<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Duul Admin Panel</title>
  <style>
    :root {
      --bg: #0E0E13; --bg2: #16161E; --card: #1C1C26; --card2: #22222E;
      --blue: #2D7DD2; --blue-light: #4A9FE8; --white: #FFFFFF;
      --text: #E8EAF0; --text-muted: #8B8FA8; --border: rgba(255,255,255,0.07);
      --green: #10B981; --red: #F87171; --gold: #F59E0B;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(45,125,210,0.15) 0%, transparent 70%), var(--bg); }
    .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 380px; text-align: center; }
    .login-logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .login-box h1 { font-size: 1.5rem; font-weight: 800; color: var(--white); margin-bottom: 0.25rem; }
    .login-box p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2rem; }
    .input-group { margin-bottom: 1rem; text-align: left; }
    .input-group label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 6px; }
    .input-group input { width: 100%; padding: 12px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.95rem; outline: none; }
    .input-group input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(45,125,210,0.15); }
    .btn-login { width: 100%; padding: 13px; background: var(--blue); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem; box-shadow: 0 0 25px rgba(45,125,210,0.3); }
    .btn-login:hover { background: var(--blue-light); }
    .error-msg { color: var(--red); font-size: 0.82rem; margin-top: 0.75rem; display: none; }
    .admin-panel { display: none; }
    .top-bar { background: rgba(14,14,19,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .top-bar-left { display: flex; align-items: center; gap: 12px; }
    .top-bar h1 { font-size: 1.1rem; font-weight: 800; color: var(--white); }
    .admin-badge { background: rgba(245,158,11,0.2); border: 1px solid rgba(245,158,11,0.3); color: var(--gold); font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .btn-logout { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: var(--red); padding: 7px 16px; border-radius: 8px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
    .admin-content { max-width: 1000px; margin: 0 auto; padding: 2rem; }
    .section-tabs { display: flex; gap: 0; margin-bottom: 2rem; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 5px; width: fit-content; }
    .section-tab { padding: 9px 24px; border-radius: 9px; border: none; background: transparent; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--text-muted); }
    .section-tab.active { background: var(--blue); color: white; }
    .flights-section { display: none; }
    .flights-section.active { display: block; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 1rem; }
    .section-header h2 { font-size: 1.1rem; font-weight: 700; color: var(--white); }
    .btn-add { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-size: 0.88rem; font-weight: 700; cursor: pointer; }
    .flights-table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 11px 14px; text-align: left; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); border-bottom: 1px solid var(--border); background: var(--card2); }
    td { padding: 12px 14px; font-size: 0.88rem; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(45,125,210,0.04); }
    .btn-edit { background: rgba(45,125,210,0.15); color: var(--blue-light); border: 1px solid rgba(45,125,210,0.2); padding: 5px 12px; border-radius: 6px; font-size: 0.78rem; font-weight: 600; cursor: pointer; margin-right: 6px; }
    .btn-delete { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); padding: 5px 12px; border-radius: 6px; font-size: 0.78rem; font-weight: 600; cursor: pointer; }
    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
    .status-ontime { background: rgba(16,185,129,0.15); color: #6EE7B7; }
    .status-delayed { background: rgba(251,191,36,0.15); color: #FCD34D; }
    .status-boarding { background: rgba(45,125,210,0.2); color: #93C5FD; }
    .status-landed { background: rgba(255,255,255,0.07); color: var(--text-muted); }
    .status-departed { background: rgba(167,139,250,0.15); color: #C4B5FD; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 2rem; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 1.2rem; font-weight: 800; color: var(--white); margin-bottom: 1.5rem; }
    .form-row { margin-bottom: 1rem; }
    .form-row label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 5px; }
    .form-row input, .form-row select { width: 100%; padding: 10px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-size: 0.9rem; outline: none; }
    .form-row input:focus, .form-row select:focus { border-color: var(--blue); }
    .form-row select option { background: var(--bg2); }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .btn-save { flex: 1; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
    .btn-cancel { flex: 1; padding: 12px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .save-banner { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid rgba(16,185,129,0.3); color: #6EE7B7; padding: 12px 24px; border-radius: 12px; font-weight: 700; font-size: 0.9rem; z-index: 300; box-shadow: 0 8px 30px rgba(0,0,0,0.4); display: none; align-items: center; gap: 8px; }
    .save-banner.show { display: flex; }
    .stats-row { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; flex: 1; min-width: 140px; }
    .stat-card .num { font-size: 2rem; font-weight: 800; color: var(--blue-light); }
    .stat-card .lbl { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">✈️</div>
    <h1>Duul Admin</h1>
    <p>Sign in to manage flights</p>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="btn-login" onclick="login()">Sign In</button>
    <div class="error-msg" id="errorMsg">❌ Wrong password. Try again.</div>
  </div>
</div>
<div class="admin-panel" id="adminPanel">
  <div class="top-bar">
    <div class="top-bar-left">
      <svg width="28" height="28" viewBox="0 0 100 100" fill="none"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#48CAE4"/><stop offset="100%" style="stop-color:#2D7DD2"/></linearGradient></defs><path d="M18 15 L18 85 L45 85 C68 85 82 70 82 50 C82 30 68 15 45 15 Z M30 27 L44 27 C60 27 70 36 70 50 C70 64 60 73 44 73 L30 73 Z" fill="url(#g)"/></svg>
      <h1>Duul Admin</h1>
      <span class="admin-badge">ADMIN</span>
    </div>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
  <div class="admin-content">
    <div class="stats-row">
      <div class="stat-card"><div class="num" id="statArrivals">0</div><div class="lbl">Arrivals</div></div>
      <div class="stat-card"><div class="num" id="statDepartures">0</div><div class="lbl">Departures</div></div>
      <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">Total Flights</div></div>
    </div>
    <div class="section-tabs">
      <button class="section-tab active" onclick="switchSection('arrivals', this)">🛬 Arrivals</button>
      <button class="section-tab" onclick="switchSection('departures', this)">🛫 Departures</button>
    </div>
    <div class="flights-section active" id="section-arrivals">
      <div class="section-header">
        <h2>Arrivals — Mogadishu (MGQ)</h2>
        <button class="btn-add" onclick="openModal('arrivals')">+ Add Arrival</button>
      </div>
      <div class="flights-table-wrap"><table><thead><tr><th>Airline</th><th>Flight</th><th>From</th><th>Time</th><th>Gate</th><th>Status</th><th>Actions</th></tr></thead><tbody id="arrivals-tbody"></tbody></table></div>
    </div>
    <div class="flights-section" id="section-departures">
      <div class="section-header">
        <h2>Departures — Mogadishu (MGQ)</h2>
        <button class="btn-add" onclick="openModal('departures')">+ Add Departure</button>
      </div>
      <div class="flights-table-wrap"><table><thead><tr><th>Airline</th><th>Flight</th><th>To</th><th>Time</th><th>Gate</th><th>Status</th><th>Actions</th></tr></thead><tbody id="departures-tbody"></tbody></table></div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add Flight</h2>
    <input type="hidden" id="editIndex"/>
    <input type="hidden" id="editType"/>
    <div class="form-row"><label>Airline Name</label><input type="text" id="f-airline" placeholder="e.g. Turkish Airlines"/></div>
    <div class="form-row"><label>Airline Code (2 letters)</label><input type="text" id="f-code" placeholder="e.g. TK" maxlength="2" style="text-transform:uppercase"/></div>
    <div class="form-row"><label>Airline Logo Color</label><input type="color" id="f-color" value="#2D7DD2"/></div>
    <div class="form-row"><label>Flight Number</label><input type="text" id="f-flightnum" placeholder="e.g. TK 694"/></div>
    <div class="form-row"><label id="cityLabel">From (City)</label><input type="text" id="f-city" placeholder="e.g. Istanbul"/></div>
    <div class="form-row"><label>Airport Code</label><input type="text" id="f-citycode" placeholder="e.g. IST, Turkey"/></div>
    <div class="form-row"><label id="timeLabel">Arrival Time</label><input type="time" id="f-time"/></div>
    <div class="form-row"><label>Gate</label><input type="text" id="f-gate" placeholder="e.g. A1"/></div>
    <div class="form-row"><label>Status</label><select id="f-status" onchange="toggleDelay()"><option value="ontime">On Time</option><option value="delayed">Delayed</option><option value="boarding">Boarding</option><option value="landed">Landed</option><option value="departed">Departed</option></select></div>
    <div class="form-row" id="delayRow" style="display:none"><label>Delay (minutes)</label><input type="number" id="f-delay" placeholder="e.g. 25" min="0"/></div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveFlight()">Save Flight</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>
<div class="save-banner" id="saveBanner">✅ Changes saved!</div>
<script>
  const ADMIN_PASSWORD = "duul2026";
  const defaultArrivals = [
    {airline:'Turkish Airlines',code:'TK',color:'#CC0001',flightnum:'TK 694',city:'Istanbul',citycode:'IST, Turkey',time:'06:45',gate:'A1',status:'ontime',delay:''},
    {airline:'flydubai',code:'FZ',color:'#003580',flightnum:'FZ 371',city:'Dubai',citycode:'DXB, UAE',time:'08:20',gate:'A2',status:'landed',delay:''},
    {airline:'Ethiopian Airlines',code:'ET',color:'#00205B',flightnum:'ET 310',city:'Addis Ababa',citycode:'ADD, Ethiopia',time:'09:55',gate:'B1',status:'boarding',delay:''},
    {airline:'Jubba Airways',code:'J9',color:'#1A6B2E',flightnum:'J9 401',city:'Nairobi',citycode:'NBO, Kenya',time:'11:30',gate:'B2',status:'delayed',delay:'25'},
    {airline:'Daallo Airlines',code:'D3',color:'#8B0000',flightnum:'D3 110',city:'Djibouti',citycode:'JIB, Djibouti',time:'13:15',gate:'A3',status:'ontime',delay:''},
    {airline:'Turkish Airlines',code:'TK',color:'#CC0001',flightnum:'TK 696',city:'Istanbul',citycode:'IST, Turkey',time:'15:30',gate:'A1',status:'ontime',delay:''},
    {airline:'flydubai',code:'FZ',color:'#003580',flightnum:'FZ 373',city:'Dubai',citycode:'DXB, UAE',time:'18:45',gate:'A2',status:'ontime',delay:''},
    {airline:'Jubba Airways',code:'J9',color:'#1A6B2E',flightnum:'J9 501',city:'Hargeisa',citycode:'HGA, Somalia',time:'20:10',gate:'B3',status:'ontime',delay:''},
  ];
  const defaultDepartures = [
    {airline:'flydubai',code:'FZ',color:'#003580',flightnum:'FZ 372',city:'Dubai',citycode:'DXB, UAE',time:'07:30',gate:'A2',status:'departed',delay:''},
    {airline:'Ethiopian Airlines',code:'ET',color:'#00205B',flightnum:'ET 311',city:'Addis Ababa',citycode:'ADD, Ethiopia',time:'10:40',gate:'B1',status:'boarding',delay:''},
    {airline:'Daallo Airlines',code:'D3',color:'#8B0000',flightnum:'D3 111',city:'Djibouti',citycode:'JIB, Djibouti',time:'12:00',gate:'A3',status:'ontime',delay:''},
    {airline:'Jubba Airways',code:'J9',color:'#1A6B2E',flightnum:'J9 402',city:'Nairobi',citycode:'NBO, Kenya',time:'13:50',gate:'B2',status:'ontime',delay:''},
    {airline:'Turkish Airlines',code:'TK',color:'#CC0001',flightnum:'TK 693',city:'Istanbul',citycode:'IST, Turkey',time:'16:15',gate:'A1',status:'ontime',delay:''},
    {airline:'Jubba Airways',code:'J9',color:'#1A6B2E',flightnum:'J9 502',city:'Hargeisa',citycode:'HGA, Somalia',time:'18:00',gate:'B3',status:'delayed',delay:'15'},
    {airline:'flydubai',code:'FZ',color:'#003580',flightnum:'FZ 374',city:'Dubai',citycode:'DXB, UAE',time:'19:50',gate:'A2',status:'ontime',delay:''},
    {airline:'Turkish Airlines',code:'TK',color:'#CC0001',flightnum:'TK 695',city:'Istanbul',citycode:'IST, Turkey',time:'22:00',gate:'A1',status:'ontime',delay:''},
  ];
  function getData(key,def){const d=localStorage.getItem(key);return d?JSON.parse(d):def;}
  function saveData(key,data){localStorage.setItem(key,JSON.stringify(data));}
  function login(){const pw=document.getElementById('passwordInput').value;if(pw===ADMIN_PASSWORD){document.getElementById('loginScreen').style.display='none';document.getElementById('adminPanel').style.display='block';renderAll();}else{document.getElementById('errorMsg').style.display='block';document.getElementById('passwordInput').value='';}}
  function logout(){document.getElementById('loginScreen').style.display='flex';document.getElementById('adminPanel').style.display='none';document.getElementById('passwordInput').value='';}
  function statusLabel(s,delay){const map={ontime:'On Time',delayed:`Delayed ${delay}m`,boarding:'Boarding',landed:'Landed',departed:'Departed'};return map[s]||s;}
  function renderAll(){renderTable('arrivals');renderTable('departures');updateStats();}
  function renderTable(type){const data=getData(type,type==='arrivals'?defaultArrivals:defaultDepartures);const tbody=document.getElementById(`${type}-tbody`);if(data.length===0){tbody.innerHTML=`<tr><td colspan="7"><div class="empty-state">No flights yet.</div></td></tr>`;return;}tbody.innerHTML=data.map((f,i)=>`<tr><td><span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:5px;background:${f.color};color:white;font-weight:800;font-size:0.65rem;margin-right:8px;">${f.code}</span>${f.airline}</td><td style="color:var(--blue-light);font-weight:700;">${f.flightnum}</td><td><strong style="color:var(--white)">${f.city}</strong><br/><span style="font-size:0.72rem;color:var(--text-muted)">${f.citycode}</span></td><td style="font-weight:700;color:var(--white)">${f.time}</td><td><span style="background:rgba(255,255,255,0.06);border:1px solid var(--border);padding:3px 10px;border-radius:5px;font-weight:700;">${f.gate}</span></td><td><span class="status-badge status-${f.status}">${statusLabel(f.status,f.delay)}</span></td><td><button class="btn-edit" onclick="editFlight('${type}',${i})">Edit</button><button class="btn-delete" onclick="deleteFlight('${type}',${i})">Delete</button></td></tr>`).join('');}
  function updateStats(){const a=getData('arrivals',defaultArrivals).length;const d=getData('departures',defaultDepartures).length;document.getElementById('statArrivals').textContent=a;document.getElementById('statDepartures').textContent=d;document.getElementById('statTotal').textContent=a+d;}
  let currentModalType='arrivals';
  function openModal(type,editIdx=null){currentModalType=type;document.getElementById('editType').value=type;document.getElementById('editIndex').value=editIdx!==null?editIdx:'';document.getElementById('modalTitle').textContent=editIdx!==null?'Edit Flight':`Add ${type==='arrivals'?'Arrival':'Departure'}`;document.getElementById('cityLabel').textContent=type==='arrivals'?'From (City)':'To (City)';document.getElementById('timeLabel').textContent=type==='arrivals'?'Arrival Time':'Departure Time';if(editIdx!==null){const data=getData(type,type==='arrivals'?defaultArrivals:defaultDepartures);const f=data[editIdx];document.getElementById('f-airline').value=f.airline;document.getElementById('f-code').value=f.code;document.getElementById('f-color').value=f.color;document.getElementById('f-flightnum').value=f.flightnum;document.getElementById('f-city').value=f.city;document.getElementById('f-citycode').value=f.citycode;document.getElementById('f-time').value=f.time;document.getElementById('f-gate').value=f.gate;document.getElementById('f-status').value=f.status;document.getElementById('f-delay').value=f.delay||'';toggleDelay();}else{document.getElementById('f-airline').value='';document.getElementById('f-code').value='';document.getElementById('f-color').value='#2D7DD2';document.getElementById('f-flightnum').value='';document.getElementById('f-city').value='';document.getElementById('f-citycode').value='';document.getElementById('f-time').value='';document.getElementById('f-gate').value='';document.getElementById('f-status').value='ontime';document.getElementById('f-delay').value='';document.getElementById('delayRow').style.display='none';}document.getElementById('modalOverlay').classList.add('open');}
  function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
  function toggleDelay(){const s=document.getElementById('f-status').value;document.getElementById('delayRow').style.display=s==='delayed'?'block':'none';}
  function saveFlight(){const type=document.getElementById('editType').value;const idx=document.getElementById('editIndex').value;const flight={airline:document.getElementById('f-airline').value,code:document.getElementById('f-code').value.toUpperCase(),color:document.getElementById('f-color').value,flightnum:document.getElementById('f-flightnum').value,city:document.getElementById('f-city').value,citycode:document.getElementById('f-citycode').value,time:document.getElementById('f-time').value,gate:document.getElementById('f-gate').value,status:document.getElementById('f-status').value,delay:document.getElementById('f-delay').value};if(!flight.airline||!flight.flightnum||!flight.city||!flight.time){alert('Please fill in Airline, Flight Number, City, and Time.');return;}const def=type==='arrivals'?defaultArrivals:defaultDepartures;const data=getData(type,def);if(idx!==''){data[parseInt(idx)]=flight;}else{data.push(flight);}saveData(type,data);renderAll();closeModal();showBanner();}
  function editFlight(type,i){openModal(type,i);}
  function deleteFlight(type,i){if(!confirm('Delete this flight?'))return;const def=type==='arrivals'?defaultArrivals:defaultDepartures;const data=getData(type,def);data.splice(i,1);saveData(type,data);renderAll();showBanner();}
  function switchSection(section,btn){document.querySelectorAll('.flights-section').forEach(el=>el.classList.remove('active'));document.querySelectorAll('.section-tab').forEach(el=>el.classList.remove('active'));document.getElementById(`section-${section}`).classList.add('active');btn.classList.add('active');}
  function showBanner(){const b=document.getElementById('saveBanner');b.classList.add('show');setTimeout(()=>b.classList.remove('show'),2500);}
  document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
</script>
</body>
</html>
